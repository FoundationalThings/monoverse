<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoVerse Test 6 — Parse Chapter</title>
    <style>
      body {
        background: #f5efe0;
        color: #1a2b3c;
        font-family: Georgia, serif;
        margin: 0;
        padding: 40px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        color: #5c7a93;
        margin-bottom: 24px;
      }
      .box {
        margin-top: 10px;
        padding: 12px;
        font-size: 13px;
        border-radius: 2px;
      }
      .pass {
        background: #d4edda;
        color: #155724;
      }
      .fail {
        background: #f8d7da;
        color: #721c24;
      }
      .pending {
        background: #fff3cd;
        color: #856404;
      }
      .info {
        background: #e8f0f7;
        color: #1a2b3c;
        font-size: 12px;
        word-break: break-all;
      }
      .verse {
        background: #fff;
        color: #1a2b3c;
        font-style: italic;
        font-size: 15px;
        line-height: 1.7;
        border-left: 3px solid #d8cebc;
        padding-left: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Test 6 &mdash; Parse Chapter &amp; Extract Verses</h1>
    <p>
      Fetches Genesis 1 and runs the exact verse extraction logic the app uses.
    </p>
    <div id="out"></div>
    <script>
      var out = document.getElementById('out');
      function log(msg, cls) {
        var d = document.createElement('div');
        d.className = 'box ' + (cls || 'info');
        d.textContent = msg;
        out.appendChild(d);
        return d;
      }

      function extractVerseText(contentArr) {
        var result = '';
        for (var i = 0; i < contentArr.length; i++) {
          var item = contentArr[i];
          if (typeof item === 'string') {
            result += ' ' + item;
          } else if (item && typeof item === 'object') {
            if (item.lineBreak) {
              result += ' ';
            } else if (item.text) {
              result += ' ' + item.text;
            }
          }
        }
        return result.replace(/\s+/g, ' ').trim();
      }

      var pending = log('Fetching GEN/1.json...', 'pending');
      var done = false;
      var req = new XMLHttpRequest();

      var timer = setTimeout(function () {
        if (done) return;
        done = true;
        req.abort();
        pending.className = 'box fail';
        pending.textContent = 'Timed out after 12s.';
      }, 12000);

      req.onload = function () {
        if (done) return;
        done = true;
        clearTimeout(timer);
        pending.className = 'box pass';
        pending.textContent = 'GEN/1.json received. Status: ' + req.status;

        var data;
        try {
          data = JSON.parse(req.responseText);
          log('JSON parsed OK', 'pass');
        } catch (e) {
          log('JSON parse failed: ' + e, 'fail');
          return;
        }

        log('Top-level keys: ' + Object.keys(data).join(', '), 'info');

        var rawContent = [];
        if (data.chapter && Array.isArray(data.chapter.content)) {
          rawContent = data.chapter.content;
          log(
            'data.chapter.content found. Length: ' + rawContent.length,
            'pass',
          );
        } else if (Array.isArray(data.content)) {
          rawContent = data.content;
          log(
            'data.content found (fallback). Length: ' + rawContent.length,
            'pass',
          );
        } else {
          log('No content array found.', 'fail');
          log('data keys: ' + JSON.stringify(Object.keys(data)), 'info');
          return;
        }

        log('Item 0: ' + JSON.stringify(rawContent[0]), 'info');
        log('Item 1: ' + JSON.stringify(rawContent[1]), 'info');
        log('Item 2: ' + JSON.stringify(rawContent[2]), 'info');
        log('Item 3: ' + JSON.stringify(rawContent[3]), 'info');

        var verses = [];
        try {
          for (var i = 0; i < rawContent.length; i++) {
            var item = rawContent[i];
            if (!item) continue;
            if (item.type === 'verse' && item.content) {
              var text = extractVerseText(item.content);
              if (text) {
                verses.push({
                  number: item.number || verses.length + 1,
                  text: text,
                });
              }
            }
          }
          log(
            'Verses extracted: ' + verses.length,
            verses.length > 0 ? 'pass' : 'fail',
          );
        } catch (e) {
          log('Error during verse extraction: ' + e, 'fail');
          return;
        }

        if (verses[0]) {
          log('v1: ' + verses[0].text, 'verse');
        }
        if (verses[1]) {
          log('v2: ' + verses[1].text, 'verse');
        }
        if (verses[2]) {
          log('v3: ' + verses[2].text, 'verse');
        }

        log('Test 6 complete', 'pass');
      };

      req.onreadystatechange = function () {
        if (req.readyState !== 4 || done) return;
        req.onload();
      };
      req.onerror = function () {
        if (done) return;
        done = true;
        clearTimeout(timer);
        pending.className = 'box fail';
        pending.textContent = 'Network error.';
      };

      try {
        req.open('GET', 'https://bible.helloao.org/api/BSB/GEN/1.json', true);
        req.send();
      } catch (e) {
        done = true;
        clearTimeout(timer);
        pending.className = 'box fail';
        pending.textContent = 'open/send threw: ' + e;
      }
    </script>
  </body>
</html>
