<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonoVerse Test 4 — Books JSON</title>
<style>
body { background: #F5EFE0; color: #1A2B3C; font-family: Georgia, serif; margin: 0; padding: 40px; }
h1 { font-size: 18px; margin-bottom: 8px; }
p  { font-size: 13px; color: #5C7A93; margin-bottom: 24px; }
.box { margin-top: 12px; padding: 12px; font-size: 13px; border-radius: 2px; }
.pass    { background: #d4edda; color: #155724; }
.fail    { background: #f8d7da; color: #721c24; }
.pending { background: #fff3cd; color: #856404; }
.info    { background: #e8f0f7; color: #1A2B3C; font-size: 12px; word-break: break-all; }
</style>
</head>
<body>
<h1>Test 4 — Books.json endpoint</h1>
<p>Testing the books list request — what the app fetches first on load.</p>
<div id="out"></div>

<script>
var out = document.getElementById('out');

function log(msg, cls) {
  var d = document.createElement('div');
  d.className = 'box ' + (cls || 'info');
  d.textContent = msg;
  out.appendChild(d);
  return d;
}

var pending = log('Fetching https://bible.helloao.org/api/BSB/books.json ...', 'pending');
var start   = new Date().getTime();
var done    = false;
var req     = new XMLHttpRequest();

var timer = setTimeout(function() {
  if (done) return;
  done = true;
  req.abort();
  pending.className = 'box fail';
  pending.textContent = '✗ Timed out after 12s.';
}, 12000);

req.onload = function() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  var ms = new Date().getTime() - start;
  pending.className = 'box pass';
  pending.textContent = '✓ Got response in ' + ms + 'ms. Status: ' + req.status;

  try {
    var data = JSON.parse(req.responseText);
    log('Parsed OK. Top-level keys: ' + Object.keys(data).join(', '), 'pass');

    var rawBooks = data.books || [];
    log('Number of books: ' + rawBooks.length, rawBooks.length === 66 ? 'pass' : 'fail');

    if (rawBooks.length > 0) {
      var first = rawBooks[0];
      log('First book keys: ' + Object.keys(first).join(', '), 'info');
      log('First book: ' + JSON.stringify(first), 'info');
    }

    if (rawBooks.length > 1) {
      log('Second book: ' + JSON.stringify(rawBooks[1]), 'info');
    }

  } catch(e) {
    log('JSON parse failed: ' + e, 'fail');
    log('Raw response (first 300 chars): ' + req.responseText.substring(0, 300), 'info');
  }
};

req.onreadystatechange = function() {
  if (req.readyState !== 4 || done) return;
  req.onload();
};

req.onerror = function() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  pending.className = 'box fail';
  pending.textContent = '✗ onerror fired — network failure.';
};

try {
  req.open('GET', 'https://bible.helloao.org/api/BSB/books.json', true);
  req.send();
} catch(e) {
  done = true;
  clearTimeout(timer);
  pending.className = 'box fail';
  pending.textContent = '✗ open/send threw: ' + e;
}
</script>
</body>
</html>
