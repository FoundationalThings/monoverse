<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonoVerse Test 5 — Parse Books</title>
    <style>
      body {
        background: #f5efe0;
        color: #1a2b3c;
        font-family: Georgia, serif;
        margin: 0;
        padding: 40px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 8px;
      }
      p {
        font-size: 13px;
        color: #5c7a93;
        margin-bottom: 24px;
      }
      .box {
        margin-top: 10px;
        padding: 12px;
        font-size: 13px;
        border-radius: 2px;
      }
      .pass {
        background: #d4edda;
        color: #155724;
      }
      .fail {
        background: #f8d7da;
        color: #721c24;
      }
      .pending {
        background: #fff3cd;
        color: #856404;
      }
      .info {
        background: #e8f0f7;
        color: #1a2b3c;
        font-size: 12px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>Test 5 — Parse Books Response</h1>
    <p>
      Fetches books.json then runs the exact same parsing logic the app uses.
      Reports each step.
    </p>
    <div id="out"></div>
    <script>
      var out = document.getElementById('out');
      function log(msg, cls) {
        var d = document.createElement('div');
        d.className = 'box ' + (cls || 'info');
        d.textContent = msg;
        out.appendChild(d);
        return d;
      }

      var pending = log('Fetching books.json...', 'pending');
      var done = false;
      var req = new XMLHttpRequest();

      var timer = setTimeout(function () {
        if (done) return;
        done = true;
        req.abort();
        pending.className = 'box fail';
        pending.textContent = '✗ Timed out.';
      }, 12000);

      req.onload = function () {
        if (done) return;
        done = true;
        clearTimeout(timer);
        pending.className = 'box pass';
        pending.textContent = '✓ books.json received. Status: ' + req.status;

        var data;
        try {
          data = JSON.parse(req.responseText);
          log('JSON parsed OK', 'pass');
        } catch (e) {
          log('JSON parse failed: ' + e, 'fail');
          return;
        }

        /* --- Exact same logic as the app's loadBooks --- */
        var books = [];
        var rawBooks = data.books || [];

        log(
          'rawBooks.length: ' + rawBooks.length,
          rawBooks.length > 0 ? 'pass' : 'fail',
        );

        /* Check first book's keys */
        if (rawBooks.length > 0) {
          var first = rawBooks[0];
          log('First book keys: ' + Object.keys(first).join(', '), 'info');
          log('first.id: ' + first.id, first.id ? 'pass' : 'fail');
          log(
            'first.name or commonName: ' + (first.name || first.commonName),
            first.name || first.commonName ? 'pass' : 'fail',
          );
          log('first.firstChapterNumber: ' + first.firstChapterNumber, 'info');
          log('first.lastChapterNumber: ' + first.lastChapterNumber, 'info');
          log('first.numberOfChapters: ' + first.numberOfChapters, 'info');
        }

        /* Build books array */
        try {
          for (var b = 0; b < rawBooks.length; b++) {
            var rb = rawBooks[b];
            var chapterList = [];
            var first2 = rb.firstChapterNumber || 1;
            var last = rb.lastChapterNumber || rb.numberOfChapters || 1;
            for (var n = first2; n <= last; n++) {
              chapterList.push({
                number: n,
                apiLink: '/api/BSB/' + rb.id + '/' + n + '.json',
              });
            }
            books.push({
              id: rb.id,
              name: rb.name || rb.commonName,
              chapters: chapterList,
            });
          }
          log(
            'books array built. Length: ' + books.length,
            books.length === 66 ? 'pass' : 'fail',
          );
        } catch (e) {
          log('Error building books array: ' + e, 'fail');
          return;
        }

        /* Spot check a few */
        if (books[0]) {
          log(
            'books[0]: ' +
              books[0].name +
              ', chapters: ' +
              books[0].chapters.length,
            'pass',
          );
          log(
            'books[0] first chapter apiLink: ' + books[0].chapters[0].apiLink,
            'info',
          );
        }
        if (books[18]) {
          log(
            'books[18]: ' +
              books[18].name +
              ', chapters: ' +
              books[18].chapters.length,
            'info',
          );
        }
        if (books[65]) {
          log(
            'books[65]: ' +
              books[65].name +
              ', chapters: ' +
              books[65].chapters.length,
            'info',
          );
        }

        log('— Test 5 complete —', 'pass');
      };

      req.onreadystatechange = function () {
        if (req.readyState !== 4 || done) return;
        req.onload();
      };
      req.onerror = function () {
        if (done) return;
        done = true;
        clearTimeout(timer);
        pending.className = 'box fail';
        pending.textContent = '✗ Network error.';
      };

      try {
        req.open('GET', 'https://bible.helloao.org/api/BSB/books.json', true);
        req.send();
      } catch (e) {
        done = true;
        clearTimeout(timer);
        pending.className = 'box fail';
        pending.textContent = '✗ open/send threw: ' + e;
      }
    </script>
  </body>
</html>
