<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonoVerse Test 3 — XHR</title>
<style>
body { background: #F5EFE0; color: #1A2B3C; font-family: Georgia, serif; margin: 0; padding: 40px; }
h1 { font-size: 18px; margin-bottom: 8px; }
p  { font-size: 13px; color: #5C7A93; margin-bottom: 24px; }
.box { margin-top: 12px; padding: 12px; font-size: 13px; border-radius: 2px; }
.pass    { background: #d4edda; color: #155724; }
.fail    { background: #f8d7da; color: #721c24; }
.pending { background: #fff3cd; color: #856404; }
.info    { background: #e8f0f7; color: #1A2B3C; font-size: 12px; word-break: break-all; }
</style>
</head>
<body>
<h1>Test 3 — XHR to HelloAO API</h1>
<p>Testing a live request to bible.helloao.org for Genesis 1.</p>
<div id="out"></div>

<script>
var out = document.getElementById('out');

function log(msg, cls) {
  var d = document.createElement('div');
  d.className = 'box ' + cls;
  d.textContent = msg;
  out.appendChild(d);
  return d;
}

/* Show XHR support */
if (typeof XMLHttpRequest !== 'undefined') {
  log('XMLHttpRequest is available', 'pass');
} else {
  log('XMLHttpRequest is NOT available — cannot make requests', 'fail');
}

var pending = log('Sending request to bible.helloao.org...', 'pending');
var start   = new Date().getTime();

var done = false;
var req  = new XMLHttpRequest();

/* Manual timeout */
var timer = setTimeout(function() {
  if (done) return;
  done = true;
  req.abort();
  pending.className = 'box fail';
  pending.textContent = '✗ Request timed out after 12 seconds.';
}, 12000);

req.onload = function() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  var ms = new Date().getTime() - start;
  pending.className = 'box pass';
  pending.textContent = '✓ Response received in ' + ms + 'ms. Status: ' + req.status;

  /* Try parsing */
  try {
    var data = JSON.parse(req.responseText);
    log('JSON.parse succeeded', 'pass');
    log('Top-level keys: ' + Object.keys(data).join(', '), 'info');

    if (data.chapter) {
      log('data.chapter exists', 'pass');
      log('data.chapter keys: ' + Object.keys(data.chapter).join(', '), 'info');
      if (data.chapter.content) {
        log('data.chapter.content exists, length: ' + data.chapter.content.length, 'pass');
        log('First content item: ' + JSON.stringify(data.chapter.content[0]), 'info');
        log('Second content item: ' + JSON.stringify(data.chapter.content[1]), 'info');
        log('Third content item: ' + JSON.stringify(data.chapter.content[2]), 'info');
      } else {
        log('data.chapter.content is missing', 'fail');
      }
    } else {
      log('data.chapter is missing. Top level: ' + JSON.stringify(Object.keys(data)), 'fail');
    }

    if (data.books) {
      log('NOTE: This looks like a books.json response, not a chapter', 'info');
      log('First book: ' + JSON.stringify(data.books[0]), 'info');
    }

  } catch(e) {
    log('JSON.parse failed: ' + e, 'fail');
    log('Response length: ' + req.responseText.length + ' chars', 'info');
    log('Response start: ' + req.responseText.substring(0, 200), 'info');
  }
};

req.onreadystatechange = function() {
  if (req.readyState !== 4) return;
  if (done) return;
  req.onload();
};

req.onerror = function() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  pending.className = 'box fail';
  pending.textContent = '✗ Network error — request failed entirely.';
};

req.onabort = function() {
  /* handled by timer above */
};

try {
  req.open('GET', 'https://bible.helloao.org/api/BSB/GEN/1.json', true);
  req.send();
  log('req.send() called without error', 'pass');
} catch(e) {
  done = true;
  clearTimeout(timer);
  pending.className = 'box fail';
  pending.textContent = '✗ req.open/send threw: ' + e;
}
</script>
</body>
</html>
