<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T5 Step 6</title>
<style>
body { background: #F5EFE0; font-family: Georgia, serif; padding: 40px; }
.box { margin-top: 10px; padding: 12px; font-size: 13px; }
.pass    { background: #d4edda; color: #155724; }
.pending { background: #fff3cd; color: #856404; }
.fail    { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<h1>T5 Step 6</h1>
<p>Expected: all previous plus "open() called.", "send() called.", then eventually "onload body ran."</p>
<div id="out"></div>
<script>
var outputEl = document.getElementById('out');
outputEl.innerHTML = '<div class="box pass">Script started.</div>';

function addResult(msg, cls) {
  var d = document.createElement('div');
  d.className = 'box ' + (cls || 'info');
  d.textContent = msg;
  outputEl.appendChild(d);
  return d;
}

var pending = addResult('Fetching books.json...', 'pending');
var done = false;
var req  = new XMLHttpRequest();
addResult('XHR created.', 'pass');

var timer = setTimeout(function() {
  if (done) return;
  done = true;
  req.abort();
  pending.className = 'box fail';
  pending.textContent = 'Timed out.';
}, 12000);

addResult('setTimeout set.', 'pass');

req.onload = function() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  pending.className = 'box pass';
  pending.textContent = 'books.json received. Status: ' + req.status;
  addResult('onload body ran.', 'pass');
};
addResult('onload defined.', 'pass');

req.onreadystatechange = function() {
  if (req.readyState !== 4 || done) return;
  req.onload();
};
addResult('onreadystatechange defined.', 'pass');

req.onerror = function() {
  if (done) return;
  done = true;
  clearTimeout(timer);
  pending.textContent = 'Network error.';
};
addResult('onerror defined.', 'pass');

try {
  req.open('GET', 'https://bible.helloao.org/api/BSB/books.json', true);
  addResult('open() called.', 'pass');
  req.send();
  addResult('send() called.', 'pass');
} catch(e) {
  done = true;
  clearTimeout(timer);
  pending.className = 'box fail';
  pending.textContent = 'open/send threw: ' + e;
}
</script>
</body>
</html>
