<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 5f</title>
<style>
body { background: #F5EFE0; font-family: Georgia, serif; padding: 40px; }
</style>
</head>
<body>
<h1>Test 5f &mdash; onload called from onreadystatechange</h1>
<p>Does calling req.onload() manually inside onreadystatechange break things?</p>
<div id="out"></div>
<script>
var outputEl = document.getElementById('out');
function addResult(msg) {
  var d = document.createElement('div');
  d.textContent = msg;
  outputEl.appendChild(d);
}

addResult('Script started.');

var req = new XMLHttpRequest();

req.onload = function() {
  addResult('onload function ran. Status: ' + req.status);
};

req.onreadystatechange = function() {
  addResult('readyState: ' + req.readyState);
  if (req.readyState === 4) {
    addResult('readyState is 4, calling req.onload()...');
    req.onload();
  }
};

req.onerror = function() { addResult('onerror fired.'); };

req.open('GET', 'https://bible.helloao.org/api/BSB/books.json', true);
req.send();
addResult('send() called.');
</script>
</body>
</html>
