<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 5c</title>
<style>
body { background: #F5EFE0; font-family: Georgia, serif; padding: 40px; }
</style>
</head>
<body>
<h1>Test 5c &mdash; JS + function that writes to DOM</h1>
<div id="out"></div>
<script>
var outputEl = document.getElementById('out');

function addResult(msg) {
  var d = document.createElement('div');
  d.textContent = msg;
  d.style.color = 'green';
  outputEl.appendChild(d);
}

addResult('Function defined and called successfully.');
addResult('Second line works too.');
</script>
</body>
</html>
