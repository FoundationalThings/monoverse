<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test 5e</title>
<style>
body { background: #F5EFE0; font-family: Georgia, serif; padding: 40px; }
</style>
</head>
<body>
<h1>Test 5e &mdash; XHR + JSON.parse</h1>
<div id="out"></div>
<script>
var outputEl = document.getElementById('out');

function addResult(msg) {
  var d = document.createElement('div');
  d.textContent = msg;
  outputEl.appendChild(d);
}

addResult('Script started.');

var req = new XMLHttpRequest();

req.onload = function() {
  addResult('onload fired. Status: ' + req.status);
  var data;
  try {
    data = JSON.parse(req.responseText);
    addResult('JSON.parse OK.');
    addResult('Keys: ' + Object.keys(data).join(', '));
    var rawBooks = data.books || [];
    addResult('Books count: ' + rawBooks.length);
    if (rawBooks[0]) {
      addResult('Book 0 keys: ' + Object.keys(rawBooks[0]).join(', '));
    }
  } catch(e) {
    addResult('JSON.parse failed: ' + e);
  }
};

req.onreadystatechange = function() {
  if (req.readyState === 4) {
    req.onload();
  }
};

req.onerror = function() {
  addResult('onerror fired.');
};

addResult('About to call req.open...');
req.open('GET', 'https://bible.helloao.org/api/BSB/books.json', true);
addResult('About to call req.send...');
req.send();
addResult('req.send returned.');
</script>
</body>
</html>
